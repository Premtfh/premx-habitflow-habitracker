    <style id="habitflow-checkbox-cinema">
      .hf-cinematic-check {
        position: relative !important;
        isolation: isolate;
        overflow: visible !important;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .hf-cinematic-check::before,
      .hf-cinematic-check::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0;
      }

      .hf-cinematic-check::before {
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.9), transparent 28%),
          conic-gradient(from 90deg, rgba(124, 58, 237, 0), rgba(6, 182, 212, 0.9), rgba(16, 185, 129, 0.9), rgba(244, 114, 182, 0.85), rgba(124, 58, 237, 0));
        filter: blur(7px);
        z-index: -1;
      }

      .hf-cinematic-check::after {
        border: 1px solid rgba(255, 255, 255, 0.65);
        box-shadow: 0 0 24px rgba(124, 58, 237, 0.35), inset 0 0 18px rgba(255, 255, 255, 0.18);
      }

      .hf-cinematic-check.hf-checked {
        transform: translateZ(0);
        box-shadow:
          0 0 18px color-mix(in srgb, var(--color-primary, #7c3aed) 55%, transparent),
          0 6px 18px rgba(0, 0, 0, 0.28) !important;
      }

      .hf-cinematic-check.hf-burst::before {
        animation: hf-cinema-flare 620ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .hf-cinematic-check.hf-burst::after {
        animation: hf-cinema-ring 620ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .hf-cinematic-check.hf-burst {
        animation: hf-cinema-pop 520ms cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
      }

      .hf-cinematic-check:focus-visible {
        outline: 2px solid var(--color-primary, #7c3aed);
        outline-offset: 3px;
      }

      @keyframes hf-cinema-pop {
        0% { transform: scale(0.88); filter: brightness(1); }
        38% { transform: scale(1.18); filter: brightness(1.6); }
        72% { transform: scale(0.96); filter: brightness(1.12); }
        100% { transform: scale(1); filter: brightness(1); }
      }

      @keyframes hf-cinema-flare {
        0% { opacity: 0; transform: scale(0.45) rotate(0deg); }
        35% { opacity: 0.95; transform: scale(1.45) rotate(70deg); }
        100% { opacity: 0; transform: scale(2.25) rotate(160deg); }
      }

      @keyframes hf-cinema-ring {
        0% { opacity: 0; transform: scale(0.72); }
        30% { opacity: 1; transform: scale(1.08); }
        100% { opacity: 0; transform: scale(1.9); }
      }

      @media (prefers-reduced-motion: reduce) {
        .hf-cinematic-check,
        .hf-cinematic-check::before,
        .hf-cinematic-check::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>

@keyframes hf-glitch-a{0%,88%,100%{clip-path:inset(0 0 0 0);opacity:.22}90%{clip-path:inset(12% 0 63% 0);opacity:.52}93%{clip-path:inset(58% 0 20% 0);transform:translate(8px,-1px)}}@keyframes hf-glitch-b{0%,84%,100%{clip-path:inset(0 0 0 0);opacity:.18}87%{clip-path:inset(42% 0 36% 0);opacity:.46}91%{clip-path:inset(8% 0 70% 0);transform:translate(-8px,1px)}}@keyframes hf-line-grow{to{transform:scaleX(1)}}@keyframes hf-fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes hf-progress{to{transform:scaleX(1)}}@media(max-width:640px){.hf-intro-hud{display:none}.hf-intro-stage{min-height:380px}.hf-intro-mark{width:86px;height:86px;font-size:42px}}@media(prefers-reduced-motion:reduce){#habitflow-intro,#habitflow-intro *{animation-duration:1ms!important;animation-iteration-count:1!important;transition-duration:1ms!important}}
    </style>
  </head>
  <body>
    <div id="habitflow-intro" aria-label="HabitFlow intro" role="status">
      <div class="hf-cine-layer hf-intro-grid"></div>
      <div class="hf-cine-layer hf-intro-tunnel" aria-hidden="true"><span style="--ring-scale:.42;--ring-delay:0ms"></span><span style="--ring-scale:.62;--ring-delay:260ms"></span><span style="--ring-scale:.84;--ring-delay:520ms"></span><span style="--ring-scale:1.08;--ring-delay:780ms"></span></div>
      <div class="hf-cine-layer hf-intro-lens"></div><div class="hf-intro-sweep"></div>
      <div class="hf-cine-layer hf-intro-shards" aria-hidden="true"><span style="--x:12%;--y:31%;--w:120px;--r:-18deg;--c:#67e8f9;--d:520ms"></span><span style="--x:74%;--y:28%;--w:150px;--r:17deg;--c:#c084fc;--d:760ms"></span><span style="--x:18%;--y:72%;--w:160px;--r:11deg;--c:#34d399;--d:1030ms"></span><span style="--x:66%;--y:68%;--w:110px;--r:-22deg;--c:#f0abfc;--d:1320ms"></span><span style="--x:40%;--y:18%;--w:90px;--r:7deg;--c:#ffffff;--d:1620ms"></span><span style="--x:54%;--y:82%;--w:130px;--r:-9deg;--c:#22d3ee;--d:1880ms"></span></div>
      <div class="hf-cine-layer hf-intro-particles" aria-hidden="true"><span style="--x:9%;--y:45%;--dx:42px;--dy:-60px;--c:#67e8f9;--d:0ms"></span><span style="--x:20%;--y:24%;--dx:72px;--dy:34px;--c:#c084fc;--d:240ms"></span><span style="--x:29%;--y:80%;--dx:-38px;--dy:-72px;--c:#34d399;--d:480ms"></span><span style="--x:45%;--y:16%;--dx:26px;--dy:62px;--c:#ffffff;--d:720ms"></span><span style="--x:62%;--y:76%;--dx:-58px;--dy:-42px;--c:#f0abfc;--d:960ms"></span><span style="--x:78%;--y:34%;--dx:-74px;--dy:30px;--c:#22d3ee;--d:1200ms"></span><span style="--x:88%;--y:62%;--dx:-52px;--dy:-58px;--c:#a78bfa;--d:1440ms"></span><span style="--x:54%;--y:50%;--dx:68px;--dy:-66px;--c:#67e8f9;--d:1680ms"></span></div>
      <div class="hf-cine-layer hf-intro-hud" aria-hidden="true"><span>streak engine</span><span>daily focus online</span><span>progress matrix</span><span>habitflow boot</span></div>
      <div class="hf-cine-layer hf-intro-scanlines"></div><div class="hf-cine-layer hf-intro-noise"></div><div class="hf-cine-layer hf-intro-vignette"></div><div class="hf-cine-layer hf-intro-bars"></div>
      <div class="hf-intro-stage"><div><div class="hf-intro-mark-wrap"><div class="hf-intro-mark" aria-hidden="true">🔥</div></div><div class="hf-intro-title">HabitFlow</div><div class="hf-intro-underline"></div><div class="hf-intro-subtitle">ignite. track. evolve.</div><div class="hf-intro-progress"><span></span></div></div></div>
      <button class="hf-intro-skip" type="button">Skip</button>
    </div>
    <div id="root"></div>

    <script id="habitflow-cinematic-intro-script">
      (() => {
        const intro = document.getElementById('habitflow-intro');
        if (!intro) return;
        const finish = () => {
          intro.classList.add('hf-intro-exit');
          window.setTimeout(() => intro.remove(), 820);
        };
        intro.querySelector('.hf-intro-skip')?.addEventListener('click', finish);
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') finish();
        }, { once: true });
        window.setTimeout(finish, window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 900 : 5400);
      })();
    </script>
    <script id="habitflow-checkbox-fix">
      (() => {
        const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
        const SELECTORS = [
          'div[title]',
          'button[class*="w-5"][class*="h-5"][class*="rounded-full"]',
          'button[class*="w-4"][class*="h-4"][class*="rounded"]'
        ].join(',');

        const isHabitDay = (el) => DATE_RE.test(el.getAttribute('title') || '');
        const isTodoToggle = (el) => el.tagName === 'BUTTON' && /(?:^|\s)w-[45](?:\s|$)/.test(el.className || '');
        const isCheckTarget = (el) => isHabitDay(el) || isTodoToggle(el);

        const isChecked = (el) => {
          const hasCheckIcon = !!el.querySelector('svg,path');
          const bg = getComputedStyle(el).backgroundColor;
          const isEmptyBg = !bg || bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent';
          return hasCheckIcon || (!isEmptyBg && !el.textContent.trim().match(/^\d{1,2}$/));
        };

        const decorate = () => {
          document.querySelectorAll(SELECTORS).forEach((el) => {
            if (!isCheckTarget(el)) return;
            el.classList.add('hf-cinematic-check');
            if (!el.hasAttribute('role')) el.setAttribute('role', 'checkbox');
            if (!el.hasAttribute('tabindex') && getComputedStyle(el).cursor !== 'default') el.setAttribute('tabindex', '0');
            const checked = isChecked(el);
            el.classList.toggle('hf-checked', checked);
            el.setAttribute('aria-checked', checked ? 'true' : 'false');
          });
        };

        const burst = (el) => {
          el.classList.remove('hf-burst');
          void el.offsetWidth;
          el.classList.add('hf-burst');
          window.setTimeout(() => el.classList.remove('hf-burst'), 700);
        };

        document.addEventListener('click', (event) => {
          const target = event.target.closest('.hf-cinematic-check');
          if (target) burst(target);
        }, true);

        document.addEventListener('keydown', (event) => {
          const target = event.target.closest('.hf-cinematic-check');
          if (!target || event.defaultPrevented) return;
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            target.click();
          }
        });

        const observer = new MutationObserver(() => requestAnimationFrame(decorate));
        const start = () => {
          decorate();
          observer.observe(document.getElementById('root') || document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
          });
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start, { once: true });
        } else {
          start();
        }
      })();
    </script>
  </body>
</html>
